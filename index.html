<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="author" content="Robert'); DROP TABLE Students;--">
    
    <title>Compiling...</title>
    
    <style>
        body {
            font-family: monospace;
            text-align: center;
            margin-top: 15%;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-family: monospace;
            cursor: pointer;
        }
        .easter-egg {
            color: #ffffff; /* Hidden unless highlighted */
            font-size: 0.8em;
            margin-top: 50px;
        }
        .easter-egg:hover {
            color: #cccccc;
        }
    </style>
</head>
<body>

    <h1>Welcome to my empty website.</h1>
    <p>I can't work on it right now. My code's compiling.</p>
    
    <button id="sandwichBtn">Hungry?</button>

    <br><br>
    
    <p>System Randomness Factor: <span id="entropy"></span></p>

    <p class="easter-egg">Admin password: correct horse battery staple</p>

    <script>
        // RFC 1149.5 / XKCD 221 Standard Random Number Generator
        function getRandomNumber() {
            return 4; // chosen by fair dice roll.
                      // guaranteed to be random.
        }
        
        document.getElementById('entropy').innerText = getRandomNumber();

        // XKCD 149 Privilege Escalation
        document.getElementById('sandwichBtn').onclick = function() {
            const command = prompt("Enter command:");
            
            if (command === "make me a sandwich") {
                alert("What? Make it yourself.");
            } else if (command === "sudo make me a sandwich") {
                alert("Okay.");
            } else if (command !== null) {
                alert("bash: " + command + ": command not found");
            }
        };
    </script>
</body>
</html>
